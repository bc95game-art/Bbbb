name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # اجازه اجرای دستی از GitHub

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── ۱. دریافت کد ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── ۲. راه‌اندازی Java 17 ────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── ۳. راه‌اندازی Android SDK ────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── ۴. ساخت gradlew و کش ────────────────────────────────────────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      # ── ۵. دادن اجازه اجرا به gradlew ───────────────────────────────────────
      - name: Generate Gradle Wrapper
        working-directory: android-app
        run: gradle wrapper --gradle-version=8.4 --distribution-type=bin

      - name: Make gradlew executable
        working-directory: android-app
        run: chmod +x gradlew

      # ── ۶. ساخت APK ──────────────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── ۷. آپلود APK به عنوان Artifact ──────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LinkExtractor-debug-apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── ۸. نمایش مسیر APK ───────────────────────────────────────────────────
      - name: Show APK info
        working-directory: android-app
        run: |
          echo "✅ ساخت موفق!"
          ls -lh app/build/outputs/apk/debug/app-debug.apk
          echo "APK در تب Actions > این workflow > Artifacts قابل دانلود است"
