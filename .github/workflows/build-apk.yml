name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. دریافت کد ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java 17 ────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. تایید لایسنس Android SDK (pre-installed on ubuntu-latest) ─────
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      # ── 4. نصب Gradle و ساخت wrapper ────────────────────────────────────
      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Generate Gradle Wrapper
        working-directory: android-app
        run: |
          gradle wrapper --gradle-version=8.4 --distribution-type=bin
          chmod +x gradlew

      # ── 5. Build APK ──────────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 6. آپلود APK ──────────────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: LinkExtractor-debug-apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build summary
        run: |
          echo "## ✅ Build موفق!" >> $GITHUB_STEP_SUMMARY
          ls -lh android-app/app/build/outputs/apk/debug/app-debug.apk >> $GITHUB_STEP_SUMMARY
          echo "APK را از بخش Artifacts دانلود کنید" >> $GITHUB_STEP_SUMMARY
